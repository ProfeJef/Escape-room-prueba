<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reto Activo — Escape Room Algebraico</title>
  
  <!-- Referencia a tu hoja de estilos principal -->
  <link rel="stylesheet" href="styles.css" />
  
  <style>
    /* Estilos extra mínimos solo para el layout interno del feedback y el overlay de victoria */
    .feedback-container {
      display: none;
      align-items: flex-start;
      margin-top: 1.5rem;
    }
    .feedback-container.visible {
      display: flex;
    }
    .reto-narrativa {
      margin-top: 1rem;
      padding: 1.2rem;
      background: var(--surface-2);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--accent);
      color: var(--text-muted);
    }
    .reto-narrativa strong { color: var(--text); }
    .reto-narrativa em { color: var(--accent-2); font-style: normal; }
    
    /* Animación pulso para el botón validar */
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    
    /* Overlay de victoria para el reto 6 */
    .victory-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(15,23,42,0.95); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
    }
    .victory-overlay.hidden { display: none !important; }
    .victory-content {
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: var(--radius-lg); padding: 3rem; text-align: center;
      max-width: 500px; width: 90%; box-shadow: 0 0 40px rgba(56,189,248,0.2);
    }
    .victory-icon { font-size: 4rem; margin-bottom: 1rem; }
    .victory-title { font-size: 1.8rem; color: var(--accent); font-weight: 800; margin: 0 0 0.5rem 0; }
    .victory-sub { color: var(--success); font-weight: 700; margin: 0 0 1.5rem 0; }
    .victory-msg { color: var(--text-muted); margin-bottom: 2rem; }
  </style>
</head>
<body class="reto-body">

  <!-- NAVBAR / RELOJ -->
  <header class="navbar">
    <div class="navbar-inner">
      <div class="progress-wrap">
        <div class="clock" id="clock">45:00</div>
        <!-- Etiqueta de penalización que aparece al lado del reloj -->
        <span id="penalizacion-txt" class="hidden"></span>
      </div>
      <div class="progress-wrap" style="justify-content: flex-end;">
        <span class="progress-txt">PROGRESO <span id="progress-txt">0/6</span></span>
        <div class="progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="reto-shell">
    <div class="reto-content">
      
      <article class="reto-card" aria-labelledby="reto-titulo">
        
        <!-- Cabecera del reto: Nivel, Título y Tags -->
        <header style="display:flex; flex-direction:column; gap:0.5rem;">
          <p class="reto-eyebrow" id="reto-eyebrow"></p>
          <h1 id="reto-titulo"></h1>
          <div class="reto-tags" id="reto-tags"></div>
        </header>

        <!-- Historia o narrativa -->
        <div class="reto-narrativa" id="reto-narrativa"></div>

        <div style="height:1px; background:var(--border); margin: 1.5rem 0;"></div>

        <!-- La pregunta principal -->
        <div id="reto-enunciado"></div>
        
        <!-- Aquí gameEngine.js inyectará el historial de fallos ("Llevas X intentos...") si los hay -->
        
        <!-- Contenedor donde JS inyectará las opciones (A, B, C, D o las de arrastrar) -->
        <div id="opciones-container" class="opciones" style="margin-top: 1.5rem;"></div>

        <!-- Botones y Alertas -->
        <div class="reto-actions" style="margin-top: 2rem; display: flex; flex-direction: column; align-items: stretch; gap: 0.5rem;">
          <button id="btn-validar" class="btn btn-primary pulse">Validar Respuesta</button>
          <!-- Aquí gameEngine.js inyectará la alerta roja/naranja de intentos -->
        </div>

        <!-- Contenedor de Feedback (Mensaje de Correcto/Incorrecto) -->
        <div id="feedback-container" class="feedback-container" aria-live="polite">
          <div class="feedback-icon" id="feedback-icon" style="font-size: 1.8rem; margin-right: 1rem;"></div>
          <div class="feedback-content">
            <h3 id="feedback-title" style="margin: 0 0 0.25rem 0; font-size: 1.1rem;"></h3>
            <p id="feedback-body" style="margin: 0; color: var(--text-muted); font-size: 0.95rem;"></p>
            <a href="#" id="btn-next" class="btn btn-secondary hidden" style="margin-top:1.2rem;">Siguiente reto →</a>
          </div>
        </div>

      </article>

    </div>
  </main>

  <!-- MOTOR DEL JUEGO -->
  <script src="gameEngine.js"></script>
</body>
</html>
