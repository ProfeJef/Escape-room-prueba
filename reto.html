<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reto Activo — Escape Room</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="reto-body">

  <nav class="navbar">
    <div class="navbar-inner">
      <div class="progress-wrap">
        <div class="clock" id="clock">45:00</div>
        <span id="penalizacion-txt" class="hidden"></span>
      </div>
      <div class="progress-wrap" style="justify-content: flex-end;">
        <span class="progress-txt">PROGRESO <span id="progress-txt">0/6</span></span>
        <div class="progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </div>
  </nav>

  <main class="reto-shell">
    <div class="reto-content">
      <article class="reto-card" aria-labelledby="reto-titulo">
        
        <header class="reto-header">
          <p class="reto-eyebrow" id="reto-eyebrow"></p>
          <h1 id="reto-titulo"></h1>
          <div class="reto-tags" id="reto-tags"></div>
        </header>

        <div class="reto-narrativa" id="reto-narrativa" style="margin-top: 1rem; padding: 1.2rem; background: var(--surface-2); border-radius: var(--radius-md); border-left: 3px solid var(--accent); color: var(--text-muted);"></div>

        <div style="height:1px; background:var(--border); margin: 1.5rem 0;"></div>

        <div id="reto-enunciado" style="font-weight: 700; font-size: 1.1rem; color: var(--text);"></div>
        
        <!-- GameEngine inyecta las opciones aquí -->
        <div id="opciones-container" class="opciones" style="margin-top: 1.5rem;"></div>

        <div class="reto-actions" style="margin-top: 2rem; display: flex; flex-direction: column; align-items: stretch; gap: 0.5rem;">
          <button id="btn-validar" class="btn btn-primary pulse">Validar Respuesta</button>
        </div>

        <div id="feedback-container" class="feedback-container hidden" aria-live="polite" style="display:flex; align-items:flex-start; margin-top:1.5rem;">
          <div class="feedback-icon" id="feedback-icon" style="font-size: 1.8rem; margin-right: 1rem;"></div>
          <div class="feedback-content">
            <h3 id="feedback-title" style="margin: 0 0 0.25rem 0; font-size: 1.1rem;"></h3>
            <p id="feedback-body" style="margin: 0; color: var(--text-muted); font-size: 0.95rem;"></p>
            <a href="#" id="btn-next" class="btn btn-secondary hidden" style="margin-top:1.2rem; text-decoration:none; display:inline-block;">Siguiente reto →</a>
          </div>
        </div>

      </article>
    </div>
  </main>

  <!-- Overlay Victoria Reto 6 -->
  <div class="victory-overlay hidden" id="victory-overlay" role="dialog" style="position:fixed; inset:0; z-index:200; background:rgba(15,23,42,0.95); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center;">
    <div class="victory-content" tabindex="-1" style="background:var(--surface); border:1px solid var(--accent); border-radius:var(--radius-lg); padding:3rem; text-align:center; max-width:500px; width:90%;">
      <div class="victory-icon" aria-hidden="true" style="font-size:4rem; margin-bottom:1rem;">⚡</div>
      <h2 class="victory-title" style="font-size:1.8rem; color:var(--accent); font-weight:800; margin:0 0 0.5rem 0;">SISTEMA RESTAURADO</h2>
      <p class="victory-sub" style="color:var(--success); font-weight:700; margin:0 0 1.5rem 0;">Código validado con éxito</p>
      <p class="victory-msg" style="color:var(--text-muted); margin-bottom:2rem;">Has liberado el algoritmo. La comunidad escolar puede acceder a sus derechos nuevamente.</p>
      <button class="btn btn-primary" id="btn-al-cierre">Ver resultados finales →</button>
    </div>
  </div>

  <script src="js/gameEngine.js"></script>
</body>
</html>
